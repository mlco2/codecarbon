site_name: CodeCarbon
site_description: Measure and reduce carbon emissions from computing - Official Documentation
site_url: https://docs.codecarbon.io/
docs_dir: docs
site_dir: site
repo_url: https://github.com/mlco2/codecarbon
repo_name: mlco2/codecarbon
edit_uri: edit/master/docs/
copyright: "&copy; CodeCarbon"

theme:
  name: zensical
  favicon: images/favicon.ico
  logo: images/codecarbon-logo.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: lucide/sun
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: lucide/moon
        name: Switch to light mode
  features:
    - content.action.edit
    - content.action.view
    - content.code.copy
    - content.code.select
    - content.tabs.link
    - content.tooltips
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.top
    - navigation.footer
    - search.highlight
  icon:
    github: mlco2/codecarbon

plugins:
  - search
  - redirects:
      redirect_maps:
        "introduction/when-to-use.md": "explanation/when-to-use.md"
        "introduction/motivation.md": "explanation/why.md"
        "introduction/methodology.md": "explanation/methodology.md"
        "introduction/rapl.md": "explanation/rapl.md"
        "introduction/power_estimation.md": "explanation/power-estimation.md"
        "introduction/model_examples.md": "explanation/model-comparisons.md"
        "introduction/faq.md": "explanation/faq.md"
        "getting-started/installation.md": "how-to/installation.md"
        "getting-started/usage.md": "tutorials/cli.md"
        "getting-started/api.md": "how-to/cloud-api.md"
        "getting-started/parameters.md": "reference/api.md"
        "getting-started/examples.md": "reference/examples.md"
        "getting-started/comet.md": "how-to/comet.md"
        "getting-started/test_on_scaleway.md": "how-to/test-on-scaleway.md"
        "advanced/linux_service.md": "how-to/linux-service.md"
        "advanced/ansible.md": "how-to/ansible.md"
        "advanced/adastra.md": "how-to/slurm.md"
        "logging/output.md": "reference/output.md"
        "logging/to_logger.md": "how-to/logging.md"
        "logging/visualize.md": "how-to/visualize.md"
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: sphinx
            docstring_section_style: table
            show_source: false
  - mike:
      version_selector: true
      canonical_version: latest

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  version:
    provider: mike
    default: latest
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mlco2/codecarbon
      name: CodeCarbon on GitHub

nav:
  - Home: index.md
  - Tutorials:
    - Your First Emissions Tracking: tutorials/first-tracking.md
    - Tracking with the CLI: tutorials/cli.md
    - Tracking with Python: tutorials/python-api.md
  - How-to Guides:
    - Installation: how-to/installation.md
    - Configure CodeCarbon: how-to/configuration.md
    - Use the Cloud API & Dashboard: how-to/cloud-api.md
    - Log to External Systems: how-to/logging.md
    - Integrate with Comet: how-to/comet.md
    - Visualize Emissions: how-to/visualize.md
    - Deploy as a Linux Service: how-to/linux-service.md
    - Deploy with Ansible: how-to/ansible.md
    - Run on SLURM (ROCm/PyTorch): how-to/slurm.md
    - Test on Scaleway: how-to/test-on-scaleway.md
  - Explanation:
    - Why CodeCarbon: explanation/why.md
    - When to Use CodeCarbon vs EcoLogits: explanation/when-to-use.md
    - Methodology: explanation/methodology.md
    - RAPL Metrics: explanation/rapl.md
    - Power Estimation: explanation/power-estimation.md
    - Model Comparisons: explanation/model-comparisons.md
    - FAQ: explanation/faq.md
  - Reference:
    - API Reference: reference/api.md
    - Output Formats: reference/output.md
    - Examples: reference/examples.md
    - CLI Reference: reference/cli.md
  - Track GenAI API Calls (EcoLogits) ↗: https://ecologits.ai/latest/?utm_source=codecarbon&utm_medium=docs
