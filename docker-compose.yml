# cp .env.example .env
# docker compose up -d
services:
    ###############################################
    # Codecarbon-related services
    ###############################################
    carbonserver:
        depends_on:
            - postgres
        build:
            context: .
            dockerfile: ./carbonserver/docker/Dockerfile
        volumes:
            - ./carbonserver:/carbonserver
            # - /home/inigo/miniconda3/envs/codecarbon311/lib/python3.11/site-packages/fief_client:/usr/local/lib/python3.11/dist-packages/fief_client
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.ui.rule=(Host(`${APP_HOSTNAME}`) && (PathPrefix(`/users`) || PathPrefix(`/auth`)|| PathPrefix(`/docs`)|| PathPrefix(`/organizations`) || PathPrefix(`/runs`) || PathPrefix(`/emissions`) || PathPrefix(`/projects`)|| PathPrefix(`/api`) || PathPrefix(`/auth-callback`)  ))"
            - "traefik.http.routers.ui.entrypoints=websecure"
            - "traefik.http.routers.ui.tls.certresolver=myresolver"

        # ports:
        #     - "8001:8001"
        environment:
            CODECARBON_LOG_LEVEL: DEBUG
            DATABASE_URL: postgresql://${DATABASE_USER:-codecarbon-user}:${DATABASE_PASS:-supersecret}@${DATABASE_HOST:-postgres}:${DATABASE_PORT:-5432}/${DATABASE_NAME:-codecarbon_db}
            FIEF_URL: ${AUTH_HOSTNAME}
            FRONTEND_URL: ${APP_HOSTNAME}
            FIEF_CLIENT_ID: AvjQENuVMr1uLXjRdexwQ0mLXtz2-YAIkkdTXQixlfU
            FIEF_CLIENT_SECRET: X3Xx3U9ag97fhsEMMCKYA4_0bgfyCbZoeQtcB27yxDI
        networks:
            - codecarbon_net

    ui:
        build:
            context: ./webapp
            dockerfile: dev.Dockerfile

        # Set environment variables based on the .env file
        env_file:
            - ./webapp/.env.development
        volumes:
            - ./webapp/src:/app/src
            - ./webapp/public:/app/public
        restart: always
        labels:
            - "traefik.enable=true"
            - "traefik.http.routers.ui.rule=Host(`${APP_HOSTNAME}`)"
            - "traefik.http.routers.ui.entrypoints=websecure"
            - "traefik.http.routers.ui.tls.certresolver=myresolver"
        # ports:
        #     - "3000:3000"
        networks:
            - codecarbon_net

    postgres:
        # container_name: ${DATABASE_HOST:-postgres_codecarbon}
        environment:
            HOSTNAME: ${DATABASE_HOST:-postgres_codecarbon}
            POSTGRES_DB: ${DATABASE_NAME:-codecarbon_db}
            POSTGRES_PASSWORD: ${DATABASE_PASS:-supersecret}
            POSTGRES_USER: ${DATABASE_USER:-codecarbon-user}
        image: postgres:13
        networks:
            - codecarbon_net
        # ports:
        #     - 5480:5432
        restart: unless-stopped
        volumes:
            - postgres_codecarbon_data:/var/lib/postgresql/data:rw

    pgadmin:
        # container_name: pgadmin_codecarbon
        image: dpage/pgadmin4
        environment:
            PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-test@test.com}
            PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-test}
        volumes:
            - pgadmin:/root/.pgadmin
            - ./carbonserver/docker/pgpassfile:/pgadmin4/pgpassfile
            - ./carbonserver/docker/pgadmin-servers.json:/pgadmin4/servers.json
        # ports:
        #     - "${PGADMIN_PORT:-5080}:80"
        networks:
            - codecarbon_net
        restart: unless-stopped

    ###############################################
    # Prometheus-related services
    ###############################################
    # Uncomment the following to enable prometheus and pushgateway

    # prometheus:
    #     image: prom/prometheus:latest
    #     ports:
    #         - "9090:9090"
    #     volumes:
    #         - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
    #     depends_on:
    #         - "prometheus-pushgateway"

    # prometheus-pushgateway:
    #     image: prom/pushgateway
    #     ports:
    #         - "9091:9091"


    ###############################################
    # Traefik (reverse proxy)
    ###############################################
    traefik:
        image: "traefik:v3"
        # container_name: "traefik"
        command:
            - "--log.level=DEBUG"
            - "--certificatesresolvers.myresolver.acme.caserver=https://acme-staging-v02.api.letsencrypt.org/directory"
            - "--api.insecure=true"
            - "--providers.docker=true"
            - "--providers.docker.exposedbydefault=false"
            - "--entrypoints.websecure.address=:443"
            - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
            # Set your email address here
            - "--certificatesresolvers.myresolver.acme.email=admin@mydomain.com"
            - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
        ports:
            - "443:443"
            - "8880:8080"
        volumes:
            - "letsencrypt-data:/letsencrypt"
            - "/var/run/docker.sock:/var/run/docker.sock:ro"
        networks:
            - codecarbon_net

volumes:
    postgres_codecarbon_data:
        name: postgres_codecarbon_data1
    pgadmin:
        name: pgadmin_codecarbon_data1
    letsencrypt-data:
        name: letsencrypt_data1

networks:
    codecarbon_net:
        name: codecarbon_network
