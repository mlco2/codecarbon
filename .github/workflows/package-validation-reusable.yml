name: package-validation-reusable

on:
  workflow_call:

permissions:
  contents: read

env:
  MAIN_PYTHON_VERSION: 3.12

jobs:
  build-package:
    if: github.event_name == 'release' || github.ref == 'refs/heads/master' || (github.event_name == 'pull_request' && github.base_ref == 'master')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
        with:
          version: "latest"
      - name: Set up Python
        run: uv python install ${{ env.MAIN_PYTHON_VERSION }}
      - name: Check versions
        run: uv run python .github/pyproject_versions.py -c
      - name: Build pip package
        run: uv build
      - name: Archive Pypi artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: pypi_dist
          path: dist

  test-package-from-wheel:
    runs-on: ubuntu-24.04
    needs: [build-package]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          sparse-checkout: |
            tests/
            pytest.ini
            docs/
            pyproject.toml
            uv.lock
          sparse-checkout-cone-mode: false
      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4
        with:
          version: "latest"
      - name: Set up Python
        run: uv python install ${{ env.MAIN_PYTHON_VERSION }}
      - name: Download built package
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: pypi_dist
          path: dist
      - name: Sync dev dependencies from lockfile and install wheel
        run: |
          uv sync --python ${{ env.MAIN_PYTHON_VERSION }} --frozen --no-install-project --group dev
          uv pip install dist/*.whl
      - name: Test package integrity
        run: |
          uv run --python ${{ env.MAIN_PYTHON_VERSION }} python -m pytest tests/test_package_integrity.py -v
          CODECARBON_ALLOW_MULTIPLE_RUNS=True uv run --python ${{ env.MAIN_PYTHON_VERSION }} python -m pytest \
            --ignore=tests/test_viz_data.py \
            -vv -m 'not integ_test' tests/
      - name: Test CLI functionality
        run: |
          uv run --python ${{ env.MAIN_PYTHON_VERSION }} codecarbon --help
          uv run --python ${{ env.MAIN_PYTHON_VERSION }} python -c "from codecarbon import EmissionsTracker; print('Package import successful')"
